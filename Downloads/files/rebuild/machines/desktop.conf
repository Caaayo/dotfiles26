# =============================================================================
# machines/desktop.conf — Profile for the gaming desktop (CachyOS)
# Sourced by install.sh
# =============================================================================

# Default shell for this machine
SET_DEFAULT_SHELL="fish"

# Git editor preference
GIT_EDITOR="nvim"

# Dev tool toggles
#INSTALL_NVM="true"
#INSTALL_PYENV="false"
#INSTALL_RUST="false"

# ── Machine-specific extras ───────────────────────────────────────────────────
machine_extras() {
  # Enable NetworkManager
  sudo systemctl enable --now NetworkManager.service

  # Enable gamemode daemon
  sudo systemctl enable --now gamemoded.service 2>/dev/null || true

  # Enable pipewire (should already be running on CachyOS)
  systemctl --user enable --now pipewire pipewire-pulse wireplumber 2>/dev/null || true
}
