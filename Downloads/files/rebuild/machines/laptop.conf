# =============================================================================
# machines/laptop.conf — Profile for the laptop (bare Arch + Hyprland)
# Sourced by install.sh
# =============================================================================

# Default shell for this machine
SET_DEFAULT_SHELL="bash"   # swap to "fish" once you're ready

# Git editor preference
GIT_EDITOR="nvim"

# Dev tool toggles
#INSTALL_NVM="true"
#INSTALL_PYENV="false"
#INSTALL_RUST="false"

# ── Machine-specific extras ───────────────────────────────────────────────────
machine_extras() {
  # Enable TLP for battery management
  sudo systemctl enable --now tlp.service

  # Enable NetworkManager
  sudo systemctl enable --now NetworkManager.service

  # Enable SSH daemon (optional — remove if you don't want inbound SSH)
  # sudo systemctl enable --now sshd.service
}
